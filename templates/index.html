<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<div class="sidebar">

    <h2>🎓 EduTrack</h2>

    <ul>
        <li><a href="#"><i class="fa-solid fa-house"></i> Dashboard</a></li>
        <li><a href="#"><i class="fa-solid fa-user-graduate"></i> Students</a></li>
        <li><a href="#"><i class="fa-solid fa-calendar-check"></i> Attendance</a></li>
        <li><a href="#"><i class="fa-solid fa-chart-column"></i> Marks</a></li>
        <li><a href="#"><i class="fa-solid fa-file"></i> Reports</a></li>
        <li><a href="#"><i class="fa-solid fa-gear"></i> Settings</a></li>
    </ul>

</div>

<div class="main">

    <div class="navbar">

        <h2>Student Management Dashboard</h2>

        <input type="text" id="studentSearch" placeholder="🔍 Search Student...">

        <div class="profile">
            <i class="fa-solid fa-bell"></i>
            <img src="https://i.pravatar.cc/50" alt="Profile">
        </div>

    </div>

    <div class="cards">

        <div class="card">
            <h3>Total Students</h3>
            <h1 id="totalStudents">250</h1>
        </div>

        <div class="card">
            <h3>Attendance</h3>
            <h1 id="attendanceRate">95%</h1>
        </div>

        <div class="card">
            <h3>Average Marks</h3>
            <h1 id="averageMarks">87%</h1>
        </div>

        <div class="card">
            <h3>Teachers</h3>
            <h1 id="teacherCount">18</h1>
        </div>

    </div>

    <div class="table-box">

        <h2>Student List</h2>

        <table id="studentTable">

            <thead>

                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Attendance</th>
                    <th>Marks</th>
                    <th>Action</th>
                </tr>

            </thead>

            <tbody>

                <tr>
                    <td>1</td>
                    <td>Zeel Faldu</td>
                    <td>11</td>
                    <td>95%</td>
                    <td>92</td>
                    <td>
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </td>
                </tr>

                <tr>
                    <td>2</td>
                    <td>Rahul Patel</td>
                    <td>11</td>
                    <td>90%</td>
                    <td>88</td>
                    <td>
                        <button class="edit-btn">Edit</button>
                        <button class="delete-btn">Delete</button>
                    </td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

</body>
</html>
